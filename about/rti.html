<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTI - GPC Ziro</title>
    <link rel="stylesheet" href="../css/main-bundle.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Page Hero Styles */
        .page-hero {
            background: url('../images/clg photo.jpg');
            padding: 80px 20px;
            align-items: center;
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            color: #fff;
            display: flex;
            justify-content: center;
            margin-bottom: 60px;
            min-height: 300px;
            overflow: hidden;
            position: relative;
            text-align: center;
            width: 100%;
        }
        .page-hero::before {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.6));
            content: "";
            height: 100%;
            left: 0;
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 1;
        }
        .page-hero-content {
            position: relative;
            z-index: 2;
        }
        .page-hero-content h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        /* Fade-in Animation Classes */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }
        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .page-hero-content h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <main>
        <!-- Page Hero -->
        <section class="page-hero">
            <div class="container">
                <div class="page-hero-content">
                    <h1 class="page-title">Right to Information (RTI)</h1>
                </div>
            </div>
        </section>

        <section class="reports-section" style="padding: 60px 0;">
            <div class="container reports-container">
                <div class="glass-card"
                    style="text-align: center; padding: 60px 40px; margin: 0 auto; max-width: 800px;">
                    <i class="fas fa-info-circle"
                        style="font-size: 3rem; color: var(--primary-color); margin-bottom: 20px;"></i>
                    <h2 style="color: #1a4a8e; margin-bottom: 25px;">RTI Information</h2>
                    <p style="font-size: 1.1rem; line-height: 1.8;">This page is currently under construction. Please
                        check back later for detailed RTI information according to the RTI Act 2005.</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer will be added/standardized later -->
    <div id="footer-placeholder"></div>

    <script src="../js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Add fade-in animation observer
            const fadeElements = document.querySelectorAll('.glass-card');
            
            fadeElements.forEach(el => el.classList.add('fade-in'));

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, {
                threshold: 0.1,
                rootMargin: "0px 0px -50px 0px"
            });

            fadeElements.forEach(el => {
                observer.observe(el);
            });
        });
    </script>
</body>
</html>
